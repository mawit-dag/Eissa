<!doctype html><html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prompts — Happy Birthday, my jaan</title>
<link rel="stylesheet" href="styles.css"/>
<script type="module">
import {spark, show, qs} from './app.js';

function save(key, value){
  const data = JSON.parse(localStorage.getItem('issaAnswers')||'{}');
  data[key]=value; localStorage.setItem('issaAnswers', JSON.stringify(data));
}

window.addEventListener('DOMContentLoaded',()=>{
  // I learned how to code for you
  qs('#codeYes').addEventListener('click',()=>{
    qs('#codeResp').textContent="I knew my baby was smart — you're hired!!!";
    show(qs('#applauseCode')); spark(qs('#applauseCode'));
    save('learnedToCode','Yes (you’re hired!!!)');
  });
  qs('#codeNo').addEventListener('click',()=>{
    qs('#codeResp').textContent="Okay fine... definitely used AI 😅";
    show(qs('#applauseCode')); spark(qs('#applauseCode'));
    save('learnedToCode','No (definitely used AI)');
  });

  // Do you feel special? No turns to Yes
  const feelYes=qs('#feelYes'), feelNo=qs('#feelNo');
  feelNo.addEventListener('click',()=>{
    feelNo.textContent='Yes';
    feelNo.classList.add('success');
    qs('#feelMsg').textContent="Corrected. Special™ confirmed.";
    show(qs('#applauseFeel')); spark(qs('#applauseFeel'));
    save('feelSpecial','Yes (button converted)');
  });
  feelYes.addEventListener('click',()=>{
    qs('#feelMsg').textContent="Yesss. As you should.";
    show(qs('#applauseFeel')); spark(qs('#applauseFeel'));
    save('feelSpecial','Yes');
  });

  // Do you love me — any choice triggers funny message
  document.querySelectorAll('[data-love]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const choice=btn.getAttribute('data-love');
      const options=[
        "wowwww I can’t believe you picked that and not this 🤯",
        "interesting alpha pick… not the meta tho 😂",
        "diversified answer — bold strategy 👀"
      ];
      qs('#loveMsg').textContent = options[Math.floor(Math.random()*options.length)];
      show(qs('#applauseLove')); spark(qs('#applauseLove'));
      save('loveAnswer', choice);
    });
  });

  // What are you most looking forward to? free text
  qs('#lookForm').addEventListener('submit',(e)=>{
    e.preventDefault();
    const val = qs('#lookText').value.trim();
    if(!val) return;
    save('mostLookingForward', val);
    qs('#lookSaved').textContent="Saved! I’ll treasure this.";
    show(qs('#applauseLook')); spark(qs('#applauseLook'));
    qs('#lookText').value='';
  });

  qs('#toConsent').addEventListener('click',()=>window.location.href='consent.html');
});
</script>
</head>
<body>
  <div class="bg-wrap"><canvas id="stars"></canvas></div>
  <div class="audio-bar">
    <span>Audio</span>
    <button class="btn" id="playAudio" type="button">Play</button>
    <button class="btn ghost" id="pauseAudio" type="button">Pause</button>
    <audio id="bg-audio" src="audio/music.mp3" loop></audio>
  </div>

  <nav>
    <div class="container">
      <div class="tabs">
        <a data-nav href="index.html">Start</a>
        <a data-nav href="love.html">Us</a>
        <a data-nav href="prompts.html" class="active">Prompts</a>
        <a data-nav href="consent.html">Important Q</a>
        <a data-nav href="trips.html">Trip Picker</a>
        <a data-nav href="gallery.html">Love Note</a>
        <a data-nav href="finale.html">Finale</a>
      </div>
    </div>
  </nav>

  <div class="container page">
    <section class="card">
      <h2>I learned how to code for you</h2>
      <div class="choices" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn success" id="codeYes">Yes</button>
        <button class="btn" id="codeNo">No</button>
      </div>
      <p id="codeResp" class="muted" style="margin-top:8px"></p>
      <div class="applause" id="applauseCode" style="margin-top:8px"><span>👏</span><span>Caught in 4K.</span></div>
    </section>

    <section class="card">
      <h2>Do you feel special?</h2>
      <div class="choices" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn success" id="feelYes">Yes</button>
        <button class="btn" id="feelNo">No</button>
      </div>
      <p id="feelMsg" class="muted" style="margin-top:8px"></p>
      <div class="applause" id="applauseFeel" style="margin-top:8px"><span>🎉</span><span>Special mode enabled.</span></div>
    </section>

    <section class="card">
      <h2>Do you love me?</h2>
      <div class="choices" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" data-love="Yes I love u so muchhh">Yes I love u so muchhh</button>
        <button class="btn" data-love="I can’t live without u">I can’t live without u</button>
        <button class="btn" data-love="My dream girl — you are my jaan">My dream girl — you are my jaan</button>
        <button class="btn" data-love="This is not about you, Dagmaaaa">This is not about you, Dagmaaaa</button>
      </div>
      <p id="loveMsg" class="muted" style="margin-top:8px"></p>
      <div class="applause" id="applauseLove" style="margin-top:8px"><span>✨</span><span>wowwww I can’t believe you picked that and not this</span></div>
    </section>

    <section class="card">
      <h2>What are you most looking forward to on this trip?</h2>
      <form id="lookForm">
        <textarea id="lookText" rows="3" placeholder="Type here…" style="width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:#0f1726;color:var(--text)"></textarea>
        <div style="margin-top:8px;display:flex;gap:10px;align-items:center">
          <button class="btn success" type="submit">Save answer</button>
          <div class="applause" id="applauseLook"><span>👏</span><span id="lookSaved">Saved!</span></div>
        </div>
      </form>
    </section>

    <div style="display:flex;justify-content:flex-end">
      <button class="btn success" id="toConsent">Next</button>
    </div>
  </div>
</body>
</html>
