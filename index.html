<!doctype html><html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Access Portal</title>
<link rel="stylesheet" href="styles.css"/>
<script type="module">
import {qs, burstConfetti} from './app.js';

window.addEventListener('DOMContentLoaded',()=>{
  const code = [];
  const correct = ['4','0','7'];
  const status = qs('#unlockStatus');

  document.querySelectorAll('.unlock-pad').forEach(btn=>{
    btn.addEventListener('click',()=>{
      code.push(btn.dataset.num);
      status.textContent = 'Unlocking... ' + '•'.repeat(code.length);
      if(code.length === 3){
        if(JSON.stringify(code) === JSON.stringify(correct)){
          status.textContent = 'Access granted, handsome 😌';
          burstConfetti();
          setTimeout(()=>window.location.href='start.html',700);
        } else {
          status.textContent = 'Wrong code. Cute try though.';
          code.length = 0;
        }
      }
    });
  });
});
</script>
</head>
<body>
  <div class="bg-wrap"><canvas id="stars"></canvas></div>

  <div class="audio-bar">
    <span>Audio</span>
    <button class="btn" id="playAudio" type="button">Play</button>
    <button class="btn ghost" id="pauseAudio" type="button">Pause</button>
    <audio id="bg-audio" src="audio/music.mp3" loop></audio>
  </div>

  <div class="container page">
    <section class="card hero-glow center">
      <span class="badge">Restricted Birthday Access</span>
      <h1 style="margin-top:14px">Enter the birthday portal</h1>
      <p>Only one very handsome fintech king is allowed through.</p>

      <div class="unlock-grid">
        <button class="unlock-pad" data-num="1">1</button>
        <button class="unlock-pad" data-num="2">2</button>
        <button class="unlock-pad" data-num="3">3</button>
        <button class="unlock-pad" data-num="4">4</button>
        <button class="unlock-pad" data-num="0">0</button>
        <button class="unlock-pad" data-num="7">7</button>
        <button class="unlock-pad" data-num="8">8</button>
        <button class="unlock-pad" data-num="9">9</button>
        <button class="unlock-pad" data-num="5">5</button>
      </div>

      <div id="unlockStatus" class="unlock-status"></div>
      <p class="muted">Hint: special date energy.</p>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
