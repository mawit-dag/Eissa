<!doctype html><html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Important Q</title>
<link rel="stylesheet" href="styles.css"/>
<script type="module">
import {spark, show, qs, saveAnswer, burstConfetti} from './app.js';
window.addEventListener('DOMContentLoaded',()=>{
  const yes=qs('#yes2');
  const no=qs('#no2');
  const applause=qs('#applause1');
  const bounds=qs('.no-escape');

  no.addEventListener('mouseover',()=>{
    const rect=bounds.getBoundingClientRect();
    const x=Math.random()*(rect.width-120);
    const y=Math.random()*(rect.height-44);
    no.style.position='absolute';
    no.style.left=x+'px';
    no.style.top=y+'px';
  });

  yes.addEventListener('click',()=>{
    qs('#milk').classList.remove('hide');
    qs('#mommyPhoto').classList.remove('hide');
    saveAnswer('whoIsYourMommy', 'you obviously');
    show(applause);
    spark(applause);
    burstConfetti();
    setTimeout(()=>window.location.href='trips.html',850);
  });

  no.addEventListener('focus',()=>no.dispatchEvent(new Event('mouseover')));
});
</script>
</head>
<body>
  <div class="bg-wrap"><canvas id="stars"></canvas></div>

  <div class="audio-bar">
    <span>Audio</span>
    <button class="btn" id="playAudio" type="button">Play</button>
    <button class="btn ghost" id="pauseAudio" type="button">Pause</button>
    <audio id="bg-audio" src="audio/music.mp3" loop></audio>
  </div>

  <nav>
    <div class="container">
      <div class="tabs">
        <a data-nav href="start.html">Start</a>
        <a data-nav href="love.html">u + me</a>
        <a data-nav href="prompts.html">Prompts</a>
        <a data-nav href="consent.html" class="active">Important Q</a>
        <a data-nav href="trips.html">Trip Picker</a>
        <a data-nav href="gallery.html">Love Letter</a>
        <a data-nav href="finale.html">Finale</a>
        <a data-nav href="credits.html">Credits</a>
      </div>
    </div>
  </nav>

  <div class="container page">
    <section class="card center">
      <h2>who is your mommy</h2>
      <div class="choices no-escape" style="justify-content:center;position:relative;height:80px">
        <button class="btn success big" id="yes2">you obviously</button>
        <button class="btn big" id="no2">No</button>
      </div>

      <div id="milk" class="hide" style="font-size:56px;margin-top:10px">🥛</div>

      <div class="applause" id="applause1" style="justify-content:center;margin-top:10px">
        <span>💖</span><span>Exactly.</span>
      </div>

      <div id="mommyPhoto" class="photo-frame hide" style="max-width:320px;margin:16px auto 0">
        <img src="images/mommy-photo.jpg" alt="photo reveal">
      </div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
