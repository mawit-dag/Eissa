<!doctype html><html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trip Picker</title>
<link rel="stylesheet" href="styles.css"/>
<script type="module">
import {spark, show, qs, qsa, saveAnswer, burstConfetti} from './app.js';

const activityMap = {
  "Vancouver": [
    "Scenic mountain drive",
    "Seaplane views",
    "Nature trail and picnic",
    "Waterfront dinner",
    "Spa reset day",
    "Fight one goose for dominance",
    "Rate trees like luxury hotels"
  ],
  "Costa Rica": [
    "Rainforest adventure",
    "Hot springs",
    "Beach sunset dinner",
    "Waterfall day trip",
    "Spa and slow day",
    "Scream at a monkey respectfully",
    "Pretend we own the jungle"
  ],
  "Las Vegas": [
    "Car racing experience",
    "Sphere show",
    "Luxury spa day",
    "Rooftop dinner",
    "Night drive and city lights",
    "Lose \$3 dramatically and retire",
    "Act like casino royalty with no evidence"
  ],
  "Tokyo": [
    "JDM car meet",
    "Sushi tasting night",
    "Arcade date",
    "Tokyo night drive",
    "Onsen reset day",
    "Bow politely to vending machines",
    "Spend 45 minutes choosing one keychain"
  ]
};

function addToCart(text){
  const li=document.createElement('li');
  li.textContent=text;
  qs('#cart').appendChild(li);
}

function renderActivities(dest){
  const box = qs('#activityChoices');
  box.innerHTML = '';
  activityMap[dest].forEach(name=>{
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.dataset.activity = name;
    btn.textContent = name;
    box.appendChild(btn);
  });
}

window.addEventListener('DOMContentLoaded',()=>{
  let chosenDest = null;
  let chosenActivities = [];

  qs('#destChoices').addEventListener('click',(e)=>{
    const pill = e.target.closest('.pill');
    if(!pill) return;
    qsa('#destChoices .pill').forEach(p=>p.classList.remove('selected'));
    pill.classList.add('selected');
    chosenDest = pill.dataset.dest;
    chosenActivities = [];
    qs('#cart').innerHTML = '';
    addToCart('Destination: ' + chosenDest);
    qs('#destPicked').textContent = chosenDest;
    show(qs('#applauseDest'));
    spark(qs('#applauseDest'));
    renderActivities(chosenDest);
    saveAnswer('tripDestination', chosenDest);
  });

  qs('#activityChoices').addEventListener('click',(e)=>{
    const b = e.target.closest('button[data-activity]');
    if(!b) return;
    const name = b.dataset.activity;
    chosenActivities.push(name);
    qs('#actPicked').textContent = name;
    show(qs('#applauseAct'));
    spark(qs('#applauseAct'));
    addToCart('Activity: ' + name);
    saveAnswer('tripActivities', chosenActivities.join(' | '));
  });

  qs('#toFinale').addEventListener('click',()=>{
    burstConfetti();
    setTimeout(()=>window.location.href='gallery.html',450);
  });
});
</script>
</head>
<body>
  <div class="bg-wrap"><canvas id="stars"></canvas></div>

  <div class="audio-bar">
    <span>Audio</span>
    <button class="btn" id="playAudio" type="button">Play</button>
    <button class="btn ghost" id="pauseAudio" type="button">Pause</button>
    <audio id="bg-audio" src="audio/music.mp3" loop></audio>
  </div>

  <nav>
    <div class="container">
      <div class="tabs">
        <a data-nav href="start.html">Start</a>
        <a data-nav href="love.html">Us</a>
        <a data-nav href="prompts.html">Prompts</a>
        <a data-nav href="consent.html">Important Q</a>
        <a data-nav href="trips.html" class="active">Trip Picker</a>
        <a data-nav href="gallery.html">Love Letter</a>
        <a data-nav href="finale.html">Finale</a>
        <a data-nav href="credits.html">Credits</a>
      </div>
    </div>
  </nav>

  <div class="container page">
    <section class="card">
      <h2>Build your birthday trip</h2>

      <h3 style="margin-top:12px">1) Destination</h3>
      <div class="choices" id="destChoices">
        <div class="pill" data-dest="Vancouver">Vancouver</div>
        <div class="pill" data-dest="Costa Rica">Costa Rica</div>
        <div class="pill" data-dest="Las Vegas">Las Vegas</div>
        <div class="pill" data-dest="Tokyo">Tokyo</div>
      </div>

      <div class="applause" id="applauseDest" style="margin-top:8px">
        <span>🎉</span><span>Locked in: <b id="destPicked">-</b></span>
      </div>

      <h3 style="margin-top:18px">2) What are we doing there?</h3>
      <div class="choices" id="activityChoices"></div>

      <div class="applause" id="applauseAct" style="margin-top:8px">
        <span>👏</span><span>Added: <b id="actPicked">-</b></span>
      </div>

      <div class="card" style="margin-top:16px">
        <h3>Trip Cart</h3>
        <ul id="cart"></ul>
        <button class="btn success" id="toFinale">Continue</button>
      </div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
