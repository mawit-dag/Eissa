<!doctype html><html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Finale</title>
<link rel="stylesheet" href="styles.css"/>
<script type="module">
import {qs, getAnswers, sendAnswersIfConfigured, burstConfetti} from './app.js';

function startFireworks(){
  const c=qs('#fireworks');
  const ctx=c.getContext('2d');
  const W=c.width, H=c.height;
  let parts=[];
  function boom(x,y,color){
    for(let i=0;i<90;i++){
      const a=Math.random()*Math.PI*2, s=Math.random()*3+1.8;
      parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:80+Math.random()*40,color});
    }
  }
  function loop(){
    ctx.globalCompositeOperation='destination-out';
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    parts.forEach(p=>{
      p.life-=1; p.x+=p.vx; p.y+=p.vy; p.vy+=0.02;
      ctx.beginPath(); ctx.arc(p.x,p.y,1.8,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();
    });
    parts=parts.filter(p=>p.life>0);
    if(Math.random()<0.08){
      const x=Math.random()*W*0.9+W*0.05, y=Math.random()*H*0.5+H*0.1;
      const pal=['#ff4d6d','#5dd6c0','#ffd166','#9ab6ff','#ffffff'];
      boom(x,y,pal[(Math.random()*pal.length)|0]);
    }
    requestAnimationFrame(loop);
  }
  loop();
  boom(W*0.5,H*0.55,'#ffd166');
  boom(W*0.7,H*0.35,'#5dd6c0');
  boom(W*0.3,H*0.4,'#ff4d6d');
}

function prettyAnswers(){
  const data = getAnswers();
  return Object.entries(data).map(([k,v]) => `- ${k}: ${v}`).join('\n') || '(No answers yet)';
}

window.addEventListener('DOMContentLoaded', async ()=>{
  startFireworks();
  burstConfetti();
  qs('#answers').textContent = prettyAnswers();

  try{
    const result = await sendAnswersIfConfigured({ submittedAt: new Date().toISOString() });
    if(result.ok){
      qs('#sendStatus').textContent = 'Answers sent successfully 💌';
    } else if(result.skipped){
      qs('#sendStatus').textContent = 'Email sending not connected yet.';
    } else {
      qs('#sendStatus').textContent = 'Could not send automatically yet.';
    }
  } catch {
    qs('#sendStatus').textContent = 'Could not send automatically yet.';
  }

  qs('#copyBtn').addEventListener('click', async ()=>{
    await navigator.clipboard.writeText(prettyAnswers());
    qs('#copyMsg').textContent = 'Copied!';
  });
});
</script>
</head>
<body>
  <div class="bg-wrap"><canvas id="stars"></canvas></div>

  <div class="audio-bar">
    <span>Audio</span>
    <button class="btn" id="playAudio" type="button">Play</button>
    <button class="btn ghost" id="pauseAudio" type="button">Pause</button>
    <audio id="bg-audio" src="audio/music.mp3" loop></audio>
  </div>

  <nav>
    <div class="container">
      <div class="tabs">
        <a data-nav href="start.html">Start</a>
        <a data-nav href="love.html">Us</a>
        <a data-nav href="prompts.html">Prompts</a>
        <a data-nav href="consent.html">Important Q</a>
        <a data-nav href="trips.html">Trip Picker</a>
        <a data-nav href="gallery.html">Love Letter</a>
        <a data-nav href="finale.html" class="active">Finale</a>
        <a data-nav href="credits.html">Credits</a>
      </div>
    </div>
  </nav>

  <div class="container page center">
    <section class="card hero-glow">
      <h2>Happy Birthday, my jaan 🎂</h2>
      <p>Another lap around the sun, still fine as ever.</p>

      <div class="video-frame card">
        <video src="videos/baby-end.mp4" controls playsinline></video>
      </div>

      <div style="display:flex;justify-content:center;margin:12px 0">
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
      </div>

      <canvas id="fireworks" class="fx" width="900" height="300"></canvas>

      <div class="card" style="text-align:left">
        <h3>Your answers</h3>
        <pre id="answers" style="white-space:pre-wrap;color:var(--text);background:#0f1726;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.12)"></pre>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <button class="btn success" id="copyBtn">Copy my answers</button>
          <span id="copyMsg" class="muted"></span>
        </div>
        <p id="sendStatus" class="muted" style="margin-top:10px"></p>
      </div>

      <div style="margin-top:10px">
        <a data-nav href="credits.html" class="btn pink">Special Thanks</a>
      </div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
